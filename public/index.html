<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Dashboard IoT</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.tailwindcss.com"></script> </head>
<body class="bg-gray-100 p-8">

<div id="app" class="max-w-2xl mx-auto">
    <h1 class="text-3xl font-bold mb-6 text-blue-600">Données Mosquitto</h1>

    <div class="bg-white p-6 rounded-lg shadow-md mb-6 text-center">
        <p class="text-gray-500 uppercase text-sm font-semibold">Dernière valeur</p>
        <p class="text-6xl font-mono text-indigo-500">{{ derniereValeur }}</p>
        <p class="text-xs text-gray-400 mt-2">Reçu à : {{ derniereHeure }}</p>
    </div>

    <div class="bg-white p-4 rounded-lg shadow-md">
        <h2 class="font-bold mb-4 border-b pb-2">Historique des messages</h2>
        <ul class="space-y-2">
            <li v-for="(msg, index) in historique" :key="index" class="text-sm flex justify-between">
                <span class="text-gray-600 italic">{{ msg.date }}</span>
                <span class="font-bold text-blue-500">{{ msg.val }}</span>
            </li>
        </ul>
    </div>
</div>

<script>
    const { createApp } = Vue;
    const socket = io(); // Connexion au serveur Node.js

    createApp({
        data() {
            return {
                derniereValeur: '--',
                derniereHeure: '--:--:--',
                historique: []
            }
        },
        mounted() {
            // On écoute l'événement envoyé par server.js
            socket.on('donnee-iot', (data) => {
                this.derniereValeur = data.val;
                this.derniereHeure = data.date;

                // On ajoute au début de la liste (limité à 10 éléments)
                this.historique.unshift(data);
                if (this.historique.length > 10) this.historique.pop();
            });
        }
    }).mount('#app');
</script>
</body>
</html>
