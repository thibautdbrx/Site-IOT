<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Dashboard IoT - Local</title>
    <script src="vue.js"></script>
    <script src="/socket.io/socket.io.js"></script>

    <style>
        /* Petit style simple pour remplacer Tailwind sans internet */
        body { font-family: sans-serif; background: #f3f4f6; padding: 2rem; color: #374151; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 1.5rem; border-radius: 0.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 1.5rem; text-align: center; }
        h1 { color: #2563eb; text-align: center; }
        .valeur { font-size: 4rem; font-family: monospace; color: #6366f1; margin: 10px 0; }
        .historique { text-align: left; }
        .item { display: flex; justify-content: space-between; border-bottom: 1px solid #e5e7eb; padding: 5px 0; }
        .date { font-style: italic; color: #6b7280; font-size: 0.8rem; }
    </style>
</head>
<body>

<div id="app" class="container">
    <h1>📡 Données Mosquitto</h1>

    <div class="card">
        <p style="text-transform: uppercase; font-size: 0.8rem; font-weight: bold; color: #6b7280;">Dernière valeur</p>
        <div class="valeur">{{ derniereValeur }}</div>
        <p style="font-size: 0.7rem; color: #9ca3af;">Reçu à : {{ derniereHeure }}</p>
    </div>

    <div class="card historique">
        <h2 style="font-weight: bold; margin-bottom: 10px; border-bottom: 1px solid #ccc;">Historique</h2>
        <div v-for="(msg, index) in historique" :key="index" class="item">
            <span class="date">{{ msg.date }}</span>
            <span style="font-weight: bold; color: #3b82f6;">{{ msg.val }}</span>
        </div>
    </div>
</div>

<script>
    const { createApp } = Vue;
    const socket = io();

    createApp({
        data() {
            return {
                derniereValeur: '--',
                derniereHeure: '--:--:--',
                historique: []
            }
        },
        mounted() {
            socket.on('donnee-iot', (data) => {
                this.derniereValeur = data.val;
                this.derniereHeure = data.date;
                this.historique.unshift(data);
                if (this.historique.length > 10) this.historique.pop();
            });
        }
    }).mount('#app');
</script>
</body>
</html>
